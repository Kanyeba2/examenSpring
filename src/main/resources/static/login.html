<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adopte-moi - Connexion</title>
    <link rel="stylesheet" href="accueil.css">
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <h1>Adopte‑moi</h1>
            </div>
            <nav class="top-nav">
                <a href="accueil.html">Accueil</a>
                <a href="accueil.html#animaux">Animaux</a>
                <a href="accueil.html#apropos">À propos</a>
            </nav>
        </div>
    </header>

    <main class="container main-grid">
        <section class="hero login-hero">
            <div class="hero-left">
                <h2>Connexion administrateur</h2>
                <p>Connectez-vous avec votre email et mot de passe pour accéder au panneau d'administration.</p>
                <form id="login-form" class="login-form">
                    <label>Email</label>
                    <input id="login-email" type="email" autocomplete="email" placeholder="email@example.com" required />
                    <label>Mot de passe</label>
                    <input id="login-password" type="password" autocomplete="current-password" placeholder="Mot de passe" required />
                    <button type="submit" id="login-submit" class="button">Se connecter</button>
                    <p id="login-error" class="login-error"></p>
                </form>
            </div>
            <div class="hero-right">
                <img src="/static/placeholder-hero.png" alt="connexion" />
            </div>
        </section>
    </main>

    <script src="login.js"></script>
</body>

</html>
