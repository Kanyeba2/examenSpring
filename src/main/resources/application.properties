# Configuration de l'application Spring Boot

# Serveur Web
server.port=8080
server.servlet.context-path=/

# Application
spring.application.name=ExamenSpring
spring.jpa.show-sql=true

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/examen_spring?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialisation de la base de données
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schema.sql

# Logging
logging.level.root=INFO
logging.level.com.examen=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# Multipart (file upload) limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
